services:
  mongo:
    image: mongo
    restart: always
    volumes:
      - mongo-data:/data/db    
    ports:
      - "27017:27017"
  
  redis:
    image: redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/taskmanager
      - REDIS_URL=redis://redis:6379  
    depends_on:
      - mongo
      - redis     
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  mongo-data:  